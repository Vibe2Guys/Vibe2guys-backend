spring:
  application:
    name: vibe2guys-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET}
    refresh-token-hash-secret: ${JWT_REFRESH_TOKEN_HASH_SECRET}
    access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:3600}
    refresh-token-expiration-seconds: ${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:1209600}
  security:
    network:
      trust-proxy-headers: ${TRUST_PROXY_HEADERS:false}
    login-throttle:
      max-attempts: ${LOGIN_THROTTLE_MAX_ATTEMPTS:5}
      window-seconds: ${LOGIN_THROTTLE_WINDOW_SECONDS:300}
      block-seconds: ${LOGIN_THROTTLE_BLOCK_SECONDS:900}
    backoffice:
      path-prefix: /api/v1/backoffice
      header-name: X-Backoffice-Key
      access-key: ${BACKOFFICE_ACCESS_KEY}

springdoc:
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
    path: /v3/api-docs

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/vibe2guys
    username: postgres
    password: postgres

app:
  jwt:
    secret: local-development-secret-key-local-development-secret-key
    refresh-token-hash-secret: local-refresh-token-hash-secret-local-refresh-token-hash-secret
  security:
    network:
      trust-proxy-headers: false
    backoffice:
      path-prefix: /api/v1/backoffice
      header-name: X-Backoffice-Key
      access-key: local-backoffice-access-key

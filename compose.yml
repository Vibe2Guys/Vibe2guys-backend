services:
  db:
    image: postgres:16-alpine
    container_name: vibe2guys-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "${DB_EXPOSE_PORT:-127.0.0.1:5432}:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibe2guys-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_TOKEN_HASH_SECRET: ${JWT_REFRESH_TOKEN_HASH_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION_SECONDS: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:-3600}
      JWT_REFRESH_TOKEN_EXPIRATION_SECONDS: ${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:-1209600}
      LOGIN_THROTTLE_MAX_ATTEMPTS: ${LOGIN_THROTTLE_MAX_ATTEMPTS:-5}
      LOGIN_THROTTLE_WINDOW_SECONDS: ${LOGIN_THROTTLE_WINDOW_SECONDS:-300}
      LOGIN_THROTTLE_BLOCK_SECONDS: ${LOGIN_THROTTLE_BLOCK_SECONDS:-900}
      BACKOFFICE_ACCESS_KEY: ${BACKOFFICE_ACCESS_KEY}
      SPRINGDOC_SWAGGER_UI_ENABLED: ${SPRINGDOC_SWAGGER_UI_ENABLED:-false}
      SPRINGDOC_API_DOCS_ENABLED: ${SPRINGDOC_API_DOCS_ENABLED:-false}
      JAVA_OPTS: ${JAVA_OPTS:-"-Xms256m -Xmx768m"}
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  postgres_data:

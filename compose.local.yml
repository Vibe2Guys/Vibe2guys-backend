services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_EXPOSE_PORT:-127.0.0.1:5432}:5432"
    volumes:
      - postgres-local-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    image: flyway/flyway:11-alpine
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - -url=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - -user=${POSTGRES_USER}
      - -password=${POSTGRES_PASSWORD}
      - -locations=filesystem:/flyway/sql
      - migrate
    volumes:
      - ./src/main/resources/db/migration:/flyway/sql:ro

  app:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_TOKEN_HASH_SECRET: ${JWT_REFRESH_TOKEN_HASH_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION_SECONDS: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:-3600}
      JWT_REFRESH_TOKEN_EXPIRATION_SECONDS: ${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:-1209600}
      LOGIN_THROTTLE_MAX_ATTEMPTS: ${LOGIN_THROTTLE_MAX_ATTEMPTS:-50}
      LOGIN_THROTTLE_WINDOW_SECONDS: ${LOGIN_THROTTLE_WINDOW_SECONDS:-60}
      LOGIN_THROTTLE_BLOCK_SECONDS: ${LOGIN_THROTTLE_BLOCK_SECONDS:-60}
      TRUST_PROXY_HEADERS: "false"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      BACKOFFICE_ACCESS_KEY: ${BACKOFFICE_ACCESS_KEY}
      S3_ENABLED: ${S3_ENABLED:-false}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_UPLOAD_PREFIX: ${S3_UPLOAD_PREFIX:-videos}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      S3_PRESIGN_EXPIRATION_SECONDS: ${S3_PRESIGN_EXPIRATION_SECONDS:-900}
      AI_RISK_ANALYSIS_ENABLED: ${AI_RISK_ANALYSIS_ENABLED:-false}
      AI_RISK_ANALYSIS_BASE_URL: ${AI_RISK_ANALYSIS_BASE_URL:-}
      AI_RISK_ANALYSIS_API_KEY: ${AI_RISK_ANALYSIS_API_KEY:-}
      AI_RISK_ANALYSIS_MODEL: ${AI_RISK_ANALYSIS_MODEL:-}
      AI_RISK_ANALYSIS_TEMPERATURE: ${AI_RISK_ANALYSIS_TEMPERATURE:-0.2}
      AI_RISK_ANALYSIS_TIMEOUT_SECONDS: ${AI_RISK_ANALYSIS_TIMEOUT_SECONDS:-20}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRINGDOC_SWAGGER_UI_ENABLED: ${SPRINGDOC_SWAGGER_UI_ENABLED:-true}
      SPRINGDOC_API_DOCS_ENABLED: ${SPRINGDOC_API_DOCS_ENABLED:-true}
      JAVA_OPTS: ${JAVA_OPTS:-}
    ports:
      - "${APP_EXPOSE_PORT:-127.0.0.1:8080}:8080"

volumes:
  postgres-local-data:
